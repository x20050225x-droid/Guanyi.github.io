<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 網站</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }
        header {
            background-color: #f6f8fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .container {
            border: 1px solid #e1e4e8;
            padding: 20px;
            border-radius: 8px;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #6a737d;
        }
    </style>
</head>
<body>

    <header>
        <h1>你好，GitHub Pages！</h1>
        <p>這是我的第一個自動化部署網站。</p>
    </header>

    <main class="container">
        <h2>關於此專案</h2>
        <p>這是一個使用 HTML5 建立的靜態網頁，目前託管於 GitHub 上。</p>
        <p>透過 Git 版本控制，我可以隨時更新並發佈內容。</p>
    </main>

    <footer>
        <p>&copy; 2024 由 GitHub 支援。最後更新於：<span id="date"></span></p>
    </footer>

    <script>
        // 自動顯示今天的日期
        document.getElementById('date').innerText = new Date().toLocaleDateString();
    </script>
</body>
</html>
